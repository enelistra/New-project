<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <h1>Snake</h1>
    <section class="hud" aria-label="Game status">
      <p>Score: <span id="score">0</span></p>
      <p>Status: <span id="status">Running</span></p>
      <button id="restart" type="button">Restart</button>
      <button id="pause" type="button">Pause</button>
    </section>

    <section id="board" class="board" aria-label="Snake game board"></section>

    <section class="controls" aria-label="Touch controls">
      <button data-dir="up" type="button">Up</button>
      <div class="control-row">
        <button data-dir="left" type="button">Left</button>
        <button data-dir="down" type="button">Down</button>
        <button data-dir="right" type="button">Right</button>
      </div>
    </section>

    <p class="hint">Controls: Arrow keys or WASD. Space/P to pause. R to restart.</p>
  </main>
  <script type="module" src="./snake-ui.mjs"></script>
</body>
</html>
